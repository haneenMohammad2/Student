      <!-- Main content -->
      <main class="container-content">
        <header class="header">
          <div class="welcome">
            <h1>Create New Exam</h1>
            <p>Set up the exam details, then add its questions below.</p>
          </div>
          <a href="exams.html" class="btn-outline">← Back to Exams</a>
        </header>

        <!-- Exam details -->
        <section class="ce-card">
          <h2 class="ce-card-title">Exam Details</h2>
          <div class="ce-grid">
            <div class="ce-field ce-field-wide">
              <label for="examTitle">Exam Title</label>
              <input type="text" id="examTitle" placeholder="e.g. Algebra Exam - Unit 1" required>
            </div>
            <div class="ce-field">
              <label for="examDateTime">Date &amp; Time</label>
              <input type="datetime-local" id="examDateTime" required>
            </div>
            <div class="ce-field">
              <label for="examStatus">Status</label>
              <select id="examStatus">
                <option value="Inactive" selected>Inactive (hidden from students)</option>
                <option value="Active">Active (visible to students)</option>
              </select>
            </div>
          </div>
        </section>

        <!-- Question builder -->
        <section class="ce-card">
          <div class="ce-card-header">
            <h2 class="ce-card-title">Questions</h2>
            <span class="ce-question-count" id="questionCount">0 questions added</span>
          </div>

          <!-- List of questions added so far -->
          <div id="questionList" class="ce-question-list">
            <p class="ce-empty" id="emptyState">No questions added yet. Add your first question below.</p>
          </div>

          <!-- Add-question form -->
          <div class="ce-add-question">
            <div class="ce-field">
              <label for="qType">Question Type</label>
              <select id="qType">
                <option value="mcq">Multiple Choice (one correct answer)</option>
                <option value="true_false">True / False</option>
                <option value="multiple_answer">Multiple Answers (several correct)</option>
                <option value="short_answer">Short Answer (numeric)</option>
              </select>
            </div>

            <div class="ce-field ce-field-wide">
              <label for="qText">Question Text</label>
              <input type="text" id="qText" placeholder="Type the question...">
            </div>

            <!-- Dynamic area: changes based on qType -->
            <div id="qOptionsArea"></div>

            <button type="button" id="addQuestionBtn" class="btn-outline">+ Add Question</button>
          </div>
        </section>

        <div id="formError" class="ce-error" style="display:none;"></div>

        <div class="ce-actions">
          <a href="exams.html" class="btn-outline">Cancel</a>
          <button type="button" id="saveExamBtn" class="btn-primary">Save Exam</button>
        </div>
      </main>
