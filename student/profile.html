<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

   <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Student Profile - ExamTrack</title>

    <link
        rel="stylesheet"
        href="../assets/css/style.css"
    >

    <link
        rel="stylesheet"
        href="../assets/css/student.css"
    >
</head>

<body>

    <div class="dashboard">

     <!-- Sidebar -->
    <aside class="side-bar">

            <!-- Logo -->
            <div class="title-dashboard">

                <div class="logo-title">

                    <img
                        src="../assets/images/logo1.png"
                        alt="ExamTrack Logo"
                    >

                    <p class="title">
                        ExamTrack
                    </p>

                </div>

                <p class="subtitle">
                    Exam &amp; Grade Tracking System
                </p>

            </div>


            <!-- Navigation -->
            <nav class="links">

                <a
                    href="dashboard.html"
                    class="link"
                >
                    <img
                        src="../assets/images/dash.png"
                        alt=""
                    >

                    <p class="name-link">
                        Dashboard
                    </p>
                </a>


                <a
                    href="available-exams.html"
                    class="link "
                >
                    <img
                        src="../assets/images/exam.png"
                        alt=""
                    >

                    <p class="name-link">
                        Exams
                    </p>
                </a>

            </nav>


            <!-- Sidebar Bottom -->
            <div class="bottom-of-page">

                <a
                    href="profile.html"
                    class="link-profile active"
                >
                    <img
                        class="profile-icon"
                        src="../assets/images/profile.png"
                        alt=""
                    >

                    <span class="name-profile">
                        Profile
                    </span>
                </a>


                <button
                    type="button"
                    class="link-logout"
                    id="logoutBtn"
                >
                    <img
                        src="../assets/images/logout.png"
                        alt="Logout"
                    >

                    <span class="name-profile">
                        Logout
                    </span>
                </button>

            </div>

        </aside>


        <!-- =========================
             Main Content
        ========================== -->

        <main class="container-content">

            <!-- Page Title -->

            <div class="page-title">

                <h1>
                    User Profile
                </h1>

                <p>
                    View and manage your academic profile details.
                </p>

            </div>


            <!-- =========================
                 Profile Top Section
            ========================== -->

            <section class="profile-top">

                <!-- Student Card -->

                <div class="student-card">

                    <img
                        id="studentImage"
                        class="student-image"
                        src="../assets/images/person.png"
                        alt="Student"
                    >

                    <h2 id="studentName">
                        Student Name
                    </h2>

                    <span
                        class="role-badge"
                        id="studentRole"
                    >
                        Student
                    </span>

                </div>


                <!-- Personal Information -->

                <div class="information-card">

                    <div class="card-header">

                        <img
                            src="../assets/images/Container (8).png"
                            alt=""
                        >

                        <h2>
                            Personal Information
                        </h2>

                    </div>

                    <div class="information-grid">

                        <div class="information-item">

                            <span>
                                FULL NAME
                            </span>

                            <p id="fullName">
                                —
                            </p>

                        </div>

                        <div class="information-item">

                            <span>
                                GENDER
                            </span>

                            <p id="gender">
                                —
                            </p>

                        </div>

                        <div class="information-item">

                            <span>
                                NATIONAL ID
                            </span>

                            <p id="nationalId">
                                —
                            </p>

                        </div>

                        <div class="information-item">

                            <span>
                                PHONE NUMBER
                            </span>

                            <p id="phoneNumber">
                                —
                            </p>

                        </div>

                    </div>

                </div>

            </section>


            <!-- =========================
                 Account Details
            ========================== -->

            <section class="information-card account-card">

                <div class="card-header">

                    <img
                        src="../assets/images/Container (6).png"
                        alt=""
                    >

                    <h2>
                        Account Details
                    </h2>

                </div>

                <div class="information-grid account-grid">

                    <div class="information-item">

                        <span>
                            EMAIL ADDRESS
                        </span>

                        <p id="email">
                            —
                        </p>

                    </div>

                    <div class="information-item">

                        <span>
                            ROLE
                        </span>

                        <p class="value-status">

                            <span class="dot purple-dot"></span>

                            <span id="role">
                                —
                            </span>

                        </p>

                    </div>

                    <div class="information-item">

                        <span>
                            USERNAME
                        </span>

                        <p id="username">
                            —
                        </p>

                    </div>

                    <div class="information-item">

                        <span>
                            STATUS
                        </span>

                        <p class="value-status">

                            <span class="dot green-dot"></span>

                            <span id="status">
                                —
                            </span>

                        </p>

                    </div>

                </div>

            </section>

        </main>

    </div>


    <!-- =========================
         JavaScript Files
    ========================== -->

    <script src="../js/core/storage.js"></script>

    <script src="../js/core/auth.js"></script>

    <script src="../js/student/profile-page.js"></script>

</body>

</html>
