<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Available Exams - ExamTrack</title>

    <link
        rel="stylesheet"
        href="../assets/css/style.css"
    >

    <link
        rel="stylesheet"
        href="../assets/css/student.css"
    >
</head>

<body>

    <div class="dashboard">

        <!-- =========================
             Sidebar
        ========================== -->

        <aside class="side-bar">

            <!-- Logo -->
            <div class="title-dashboard">

                <div class="logo-title">

                    <img
                        src="../assets/images/logo1.png"
                        alt="ExamTrack Logo"
                    >

                    <p class="title">
                        ExamTrack
                    </p>

                </div>

                <p class="subtitle">
                    Exam &amp; Grade Tracking System
                </p>

            </div>


            <!-- Navigation -->
            <nav class="links">

                <a
                    href="dashboard.html"
                    class="link"
                >
                    <img
                        src="../assets/images/dash.png"
                        alt=""
                    >

                    <p class="name-link">
                        Dashboard
                    </p>
                </a>


                <a
                    href="available-exams.html"
                    class="link active"
                >
                    <img
                        src="../assets/images/exam.png"
                        alt=""
                    >

                    <p class="name-link">
                        Exams
                    </p>
                </a>

            </nav>


            <!-- Sidebar Bottom -->
            <div class="bottom-of-page">

                <a
                    href="profile.html"
                    class="link-profile"
                >
                    <img
                        class="profile-icon"
                        src="../assets/images/profile.png"
                        alt=""
                    >

                    <span class="name-profile">
                        Profile
                    </span>
                </a>


                <button
                    type="button"
                    class="link-logout"
                    id="logoutBtn"
                >
                    <img
                        src="../assets/images/logout.png"
                        alt="Logout"
                    >

                    <span class="name-profile">
                        Logout
                    </span>
                </button>

            </div>

        </aside>


        <!-- =========================
             Main Content
        ========================== -->

        <main class="container-content">

            <!-- Page Header -->
            <section class="welcome-section">

                <div>

                    <h1>
                        Available Exams
                    </h1>

                    <p>
                        Active exams you're eligible to take right now.
                    </p>

                </div>

            </section>


            <!-- Available Exams -->
            <section class="dashboard-section">

                <!-- JavaScript adds exam cards here -->
                <div
                    class="exams-container"
                    id="examsContainer"
                ></div>


                <!-- Empty State -->
                <p
                    class="empty-message"
                    id="emptyMessage"
                    style="display: none;"
                >
                    No active exams available right now.
                    Check back later.
                </p>

            </section>

        </main>

    </div>


    <!-- =========================
         JavaScript Files
    ========================== -->

    <script src="../js/core/storage.js"></script>

    <script src="../js/core/auth.js"></script>

    <script src="../js/student/available-exams.js"></script>

</body>

</html>
